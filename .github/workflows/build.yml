name: Build

on:
  push:
    tags: [ 'v*' ]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libxcb-xinerama0 libegl1-mesa libgl1-mesa-glx \
            libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0 libxcb-xkb1 \
            libxcb-xinerama0 libdbus-1-3 \
            patchelf

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile \
            --name HourBoostr \
            --add-data "README.md:." \
            --hidden-import steam \
            --hidden-import steam.client \
            --hidden-import steam.core.cm \
            --hidden-import steam.core.msg \
            --hidden-import steam.enums \
            --hidden-import steam.enums.emsg \
            --hidden-import steam.exceptions \
            --hidden-import steam.webapi \
            --hidden-import steam.webauth \
            --hidden-import gevent \
            --hidden-import gevent.monkey \
            --hidden-import gevent.pool \
            --hidden-import eventemitter \
            --hidden-import protobuf \
            --hidden-import requests \
            --hidden-import xml.etree.ElementTree \
            --collect-all steam \
            --collect-all gevent \
            run_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HourBoostr-linux
          path: dist/HourBoostr

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --console `
            --name HourBoostr.exe `
            --add-data "README.md;." `
            --hidden-import steam `
            --hidden-import steam.client `
            --hidden-import steam.core.cm `
            --hidden-import steam.core.msg `
            --hidden-import steam.enums `
            --hidden-import steam.enums.emsg `
            --hidden-import steam.exceptions `
            --hidden-import steam.webapi `
            --hidden-import steam.webauth `
            --hidden-import gevent `
            --hidden-import gevent.monkey `
            --hidden-import gevent.pool `
            --hidden-import eventemitter `
            --hidden-import protobuf `
            --hidden-import requests `
            --hidden-import xml.etree.ElementTree `
            --collect-all steam `
            --collect-all gevent `
            run_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HourBoostr-windows
          path: dist/HourBoostr.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: HourBoostr-*
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            HourBoostr
            HourBoostr.exe
